# ─── Port 443: Primary HTTPS VirtualHost ───────────────────
<VirtualHost *:443>
    ServerName your-domain.com
    ServerAdmin admin@your-domain.com

    # ─── SSL ─────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/your-domain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/your-domain.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # ─── Security Headers ────────────────────────────────────
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # ─── Compression ─────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain text/css application/json
        AddOutputFilterByType DEFLATE application/javascript text/xml
        AddOutputFilterByType DEFLATE application/xml text/javascript
        AddOutputFilterByType DEFLATE image/svg+xml
        DeflateCompressionLevel 6
    </IfModule>

    # ─── Max upload size (50MB) ──────────────────────────────
    LimitRequestBody 52428800

    # ─── Frontend — React SPA ────────────────────────────────
    DocumentRoot /var/www/riforma

    <Directory /var/www/riforma>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback: serve index.html for all non-file requests
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # Cache static assets (JS, CSS, images) for 1 year
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # ─── Backend API Reverse Proxy ───────────────────────────
    ProxyPreserveHost On
    ProxyTimeout 120

    # General API proxy
    <Location /api/>
        ProxyPass http://127.0.0.1:8000/api/
        ProxyPassReverse http://127.0.0.1:8000/api/

        # Pass real client IP
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}e"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}e"
        RequestHeader set X-Forwarded-Proto "https"
    </Location>

    # Uploaded files — proxied to backend (auth-protected)
    <Location /uploads/>
        ProxyPass http://127.0.0.1:8000/uploads/
        ProxyPassReverse http://127.0.0.1:8000/uploads/

        Header always set X-Content-Type-Options "nosniff"
        Header always set Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'none'; script-src 'none'"
    </Location>

    # Health check endpoints
    <Location /health>
        ProxyPass http://127.0.0.1:8000/health
        ProxyPassReverse http://127.0.0.1:8000/health
    </Location>

    <Location /ready>
        ProxyPass http://127.0.0.1:8000/ready
        ProxyPassReverse http://127.0.0.1:8000/ready
    </Location>

    # ─── Block FastAPI docs in production ────────────────────
    <LocationMatch "^/(docs|redoc|openapi\.json)">
        Require all denied
    </LocationMatch>

    # ─── Block hidden files (.git, .env, etc) ────────────────
    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    # ─── Rate Limiting (mod_ratelimit / mod_evasive) ─────────
    # For advanced rate limiting, install mod_evasive:
    #   apt install libapache2-mod-evasive
    #
    # <IfModule mod_evasive24.c>
    #     DOSHashTableSize 3097
    #     DOSPageCount 20
    #     DOSSiteCount 100
    #     DOSPageInterval 1
    #     DOSSiteInterval 1
    #     DOSBlockingPeriod 10
    # </IfModule>

    # ─── Logging ─────────────────────────────────────────────
    ErrorLog ${APACHE_LOG_DIR}/riforma-error.log

    # Suppress health check logging
    SetEnvIf Request_URI "^/health$" dontlog
    SetEnvIf Request_URI "^/ready$" dontlog
    CustomLog ${APACHE_LOG_DIR}/riforma-access.log combined env=!dontlog
</VirtualHost>

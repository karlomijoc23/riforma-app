# ============================================================
# Riforma Apache Configuration — HTTPS Primary
# ============================================================
# Prerequisites:
#   a2enmod ssl rewrite proxy proxy_http headers deflate
#   Obtain cert: certbot --apache -d your-domain.com
# Replace "your-domain.com" with your actual domain.
# ============================================================

# ─── Port 80: Redirect all HTTP → HTTPS ────────────────────
<VirtualHost *:80>
    ServerName your-domain.com
    ServerAdmin admin@your-domain.com

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>


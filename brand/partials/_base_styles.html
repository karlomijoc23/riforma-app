{# Shared WeasyPrint stylesheet used by every Riforma report template.

Include at the top of <head>:
    {% include "partials/_base_styles.html" %}

Then put report-specific overrides (e.g. unusual page size, extra
component styles) in a second <style> block in the same template.

Design tokens follow the Riforma brand identity file:
  Primary   #0F5E4D  (dark green)
  Primary-2 #0B4237  (darker green for hover/accents)
  Accent    #00C08B  (signal green)
  Ink       #0E1116  (body text)
  Subtle    #0F5E4D0D (panel tint)
  Border    #0F5E4D33

Use the `report-page`, `report-head`, `section`, `kpi-grid`, `data-table`,
and `badge` patterns wherever possible — that's what keeps the output
consistent across the eight report types.
#}
<style>
  /* ─────────────────────────  Design tokens  ───────────────────────── */
  :root {
    --color-primary: #0f5e4d;
    --color-primary-dark: #0b4237;
    --color-accent: #00c08b;
    --color-ink: #0e1116;
    --color-ink-soft: #4a5660;
    --color-muted: #7a8a93;
    --color-subtle: rgba(15, 94, 77, 0.06);
    --color-border: rgba(15, 94, 77, 0.18);
    --color-border-strong: rgba(15, 94, 77, 0.32);
    --color-surface: #ffffff;
    --color-surface-alt: #f7faf9;

    --status-positive-bg: #e6f7ee;
    --status-positive-fg: #0f6a44;
    --status-positive-bd: #b9e3c9;
    --status-info-bg: #e8f1ee;
    --status-info-fg: #0f5e4d;
    --status-info-bd: #c0d8d1;
    --status-warn-bg: #fef3c7;
    --status-warn-fg: #8a5a00;
    --status-warn-bd: #f6dba0;
    --status-danger-bg: #fde8e8;
    --status-danger-fg: #b42318;
    --status-danger-bd: #f3b5b0;

    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 10px;
  }

  /* ─────────────────────────  Page + base  ────────────────────────── */
  @page {
    size: A4 portrait;
    margin: 14mm 14mm 16mm 14mm;
    @bottom-left {
      content: "Riforma";
      font-family: 'Helvetica Neue', 'Helvetica', Arial, sans-serif;
      font-size: 8pt;
      color: #9aa3ad;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    @bottom-right {
      content: "Stranica " counter(page) " / " counter(pages);
      font-family: 'Helvetica Neue', 'Helvetica', Arial, sans-serif;
      font-size: 8pt;
      color: #9aa3ad;
    }
  }

  @page :first {
    @bottom-left { content: ""; }
  }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Helvetica Neue', 'Helvetica', Arial, sans-serif;
    color: var(--color-ink);
    font-size: 9.5pt;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }

  /* ─────────────────────────  Cover + header  ─────────────────────── */
  .report-head {
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 65%, #082b24 100%);
    color: #ffffff;
    padding: 16mm 14mm 14mm 14mm;
    margin: -14mm -14mm 10mm -14mm;
    position: relative;
    overflow: hidden;
  }

  .report-head::after {
    content: "";
    position: absolute;
    right: -40mm;
    top: -20mm;
    width: 90mm;
    height: 90mm;
    background: radial-gradient(circle, rgba(0, 192, 139, 0.35) 0%, rgba(0, 192, 139, 0) 70%);
    pointer-events: none;
  }

  .report-head__eyebrow {
    font-size: 8pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.72);
    margin: 0 0 6px 0;
  }

  .report-head__title {
    font-size: 22pt;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 4px 0;
    line-height: 1.15;
  }

  .report-head__subtitle {
    font-size: 10.5pt;
    color: rgba(255, 255, 255, 0.82);
    margin: 0;
    max-width: 70%;
  }

  .report-head__meta {
    position: absolute;
    top: 16mm;
    right: 14mm;
    text-align: right;
    font-size: 8.5pt;
    color: rgba(255, 255, 255, 0.72);
  }

  .report-head__meta strong {
    display: block;
    color: #ffffff;
    font-size: 10.5pt;
    font-weight: 600;
    margin-top: 2px;
  }

  .report-head__accent-bar {
    height: 3px;
    background: var(--color-accent);
    margin: 12mm -14mm -14mm -14mm;
  }

  /* Landscape variant header */
  body.is-landscape .report-head {
    padding: 12mm 14mm 12mm 14mm;
  }

  /* ─────────────────────────  Section  ────────────────────────────── */
  h2.section,
  .section-title {
    font-size: 8.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--color-primary);
    margin: 10mm 0 4mm 0;
    padding-bottom: 3mm;
    border-bottom: 1px solid var(--color-border);
  }

  .section-title:first-of-type {
    margin-top: 4mm;
  }

  /* ─────────────────────────  KPI grid  ───────────────────────────── */
  .kpi-grid {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4mm 0;
    table-layout: fixed;
    margin: 0 -4mm;
  }

  .kpi-grid td {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 5mm 5mm;
    vertical-align: top;
  }

  .kpi-grid td.kpi--positive {
    background: var(--status-positive-bg);
    border-color: var(--status-positive-bd);
  }

  .kpi-grid td.kpi--info {
    background: var(--status-info-bg);
    border-color: var(--status-info-bd);
  }

  .kpi-grid td.kpi--accent {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #ffffff;
  }

  .kpi__label {
    font-size: 7.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--color-muted);
    margin: 0 0 2mm 0;
  }

  .kpi--accent .kpi__label {
    color: rgba(255, 255, 255, 0.72);
  }

  .kpi__value {
    font-size: 15pt;
    font-weight: 600;
    line-height: 1.1;
    color: var(--color-ink);
    letter-spacing: -0.01em;
  }

  .kpi--accent .kpi__value {
    color: #ffffff;
  }

  .kpi__sub {
    font-size: 8pt;
    color: var(--color-muted);
    margin-top: 1.5mm;
  }

  .kpi--accent .kpi__sub {
    color: rgba(255, 255, 255, 0.7);
  }

  /* ─────────────────────────  Tables  ─────────────────────────────── */
  table.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 9pt;
    background: var(--color-surface);
  }

  table.data-table thead th {
    background: var(--color-subtle);
    color: var(--color-primary);
    text-align: left;
    font-weight: 700;
    font-size: 8pt;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3mm 3.5mm;
    border-bottom: 1px solid var(--color-border-strong);
  }

  table.data-table tbody td {
    padding: 3mm 3.5mm;
    border-bottom: 1px solid var(--color-border);
    vertical-align: top;
    color: var(--color-ink);
  }

  table.data-table tbody tr:last-child td {
    border-bottom: 0;
  }

  table.data-table tbody tr.alt td,
  table.data-table tbody tr:nth-child(even) td {
    background: var(--color-surface-alt);
  }

  table.data-table tfoot td {
    padding: 3mm 3.5mm;
    border-top: 2px solid var(--color-primary);
    font-weight: 700;
    color: var(--color-primary);
    background: var(--color-subtle);
  }

  .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ─────────────────────────  Badges  ─────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 1mm 2.5mm;
    border-radius: 999px;
    font-size: 7.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1.3;
    background: var(--status-info-bg);
    color: var(--status-info-fg);
    border: 1px solid var(--status-info-bd);
    white-space: nowrap;
  }

  .badge--positive {
    background: var(--status-positive-bg);
    color: var(--status-positive-fg);
    border-color: var(--status-positive-bd);
  }

  .badge--warn {
    background: var(--status-warn-bg);
    color: var(--status-warn-fg);
    border-color: var(--status-warn-bd);
  }

  .badge--danger {
    background: var(--status-danger-bg);
    color: var(--status-danger-fg);
    border-color: var(--status-danger-bd);
  }

  .badge--neutral {
    background: var(--color-subtle);
    color: var(--color-ink-soft);
    border-color: var(--color-border);
  }

  /* ─────────────────────────  Cards + panels  ─────────────────────── */
  .panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 5mm 6mm;
  }

  .panel--accent {
    background: var(--color-subtle);
    border-color: var(--color-border-strong);
  }

  .panel__title {
    font-size: 8.5pt;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--color-primary);
    font-weight: 700;
    margin: 0 0 3mm 0;
  }

  /* ─────────────────────────  Typography helpers  ─────────────────── */
  .text-muted { color: var(--color-muted); }
  .text-soft { color: var(--color-ink-soft); }
  .text-primary { color: var(--color-primary); }
  .text-accent { color: var(--color-accent); }
  .text-sm { font-size: 8.5pt; }
  .text-xs { font-size: 7.5pt; }
  .text-right { text-align: right; }
  .fw-bold { font-weight: 700; }
  .fw-semibold { font-weight: 600; }
  .num-large { font-size: 14pt; font-weight: 600; letter-spacing: -0.01em; }

  /* ─────────────────────────  Layout helpers  ─────────────────────── */
  .row { display: flex; gap: 4mm; align-items: stretch; }
  .row > .col { flex: 1; }
  .row > .col-2 { flex: 2; }
  .row > .col-3 { flex: 3; }

  .stack { display: block; }
  .stack > * + * { margin-top: 3mm; }

  hr.divider {
    border: 0;
    border-top: 1px solid var(--color-border);
    margin: 6mm 0;
  }

  /* ─────────────────────────  Print hints  ─────────────────────────── */
  .pagebreak { page-break-after: always; }
  .no-break  { page-break-inside: avoid; }
  table.data-table thead { display: table-header-group; }
  table.data-table tr    { page-break-inside: avoid; }
</style>

version: "3.9"

services:
  # ─── MariaDB ───────────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: riforma-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-in-production}
      MARIADB_DATABASE: ${DB_NAME:-riforma}
      MARIADB_USER: ${DB_USER:-riforma}
      MARIADB_PASSWORD: ${DB_PASSWORD:-riforma}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./backups:/backups
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
      - --innodb-buffer-pool-size=256M
      - --max-connections=100
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - riforma-net

  # ─── Backend (FastAPI) ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: riforma-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: "mariadb+asyncmy://${DB_USER:-riforma}:${DB_PASSWORD:-riforma}@mariadb:3306/${DB_NAME:-riforma}"
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEED_ADMIN_ON_STARTUP: ${SEED_ADMIN_ON_STARTUP:-false}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_FULL_NAME: ${INITIAL_ADMIN_FULL_NAME:-}
      INITIAL_ADMIN_ROLE: ${INITIAL_ADMIN_ROLE:-admin}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost}
      ENVIRONMENT: "production"
      USE_IN_MEMORY_DB: "false"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - riforma-net

  # ─── Frontend (React via Nginx) ────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    container_name: riforma-frontend
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - riforma-net

  # ─── MariaDB Metrics Exporter (Prometheus) ─────────
  mariadb-exporter:
    image: prom/mysqld-exporter:v0.15.0
    container_name: riforma-mariadb-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${DB_USER:-riforma}:${DB_PASSWORD:-riforma}@(mariadb:3306)/"
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "9104:9104"
    networks:
      - riforma-net

volumes:
  mariadb-data:
  uploads-data:

networks:
  riforma-net:
    driver: bridge
